// ===== Combobox setup =====
function setupCombo(inputId, listId, onSelect) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  let highlight = 0;
  let currentItems = [];

  function render(query) {
    const q = query.trim().toLowerCase();
    let items;
    if (!q) {
      items = ENTRIES.slice(0, 50);
    } else {
      // Prioritize startsWith matches
      const starts = ENTRIES.filter(e => e.search.split(" ").some(w => w.startsWith(q)));
      const contains = ENTRIES.filter(e => !starts.includes(e) && e.search.includes(q));
      items = [...starts, ...contains].slice(0, 50);
    }
    currentItems = items;
    highlight = 0;
    list.innerHTML = items.map((e, i) => `
      <div class="combo-item ${i===0?'highlight':''}" data-idx="${i}">
        <div>
          <div>${e.label}</div>
          <div style="font-size:11px;color:#718096;">${e.sub}</div>
        </div>
        <span class="tag ${e.type}">${e.type==='country'?'国家':'城市'}</span>
      </div>
    `).join('') || '<div class="combo-item" style="color:#a0aec0;">无结果 No results</div>';
    list.classList.add('open');
  }

  function select(item) {
    input.value = item.label;
    input.dataset.tz = item.tz;
    input.dataset.sub = item.sub;
    list.classList.remove('open');
    onSelect(item);
  }

  input.addEventListener('focus', () => render(input.value));
  input.addEventListener('input', () => render(input.value));
  input.addEventListener('keydown', e => {
    if (!list.classList.contains('open')) return;
    const items = list.querySelectorAll('.combo-item[data-idx]');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      highlight = Math.min(highlight + 1, items.length - 1);
      updateHighlight(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      highlight = Math.max(highlight - 1, 0);
      updateHighlight(items);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (currentItems[highlight]) select(currentItems[highlight]);
    } else if (e.key === 'Escape') {
      list.classList.remove('open');
    }
  });

  function updateHighlight(items) {
    items.forEach((el, i) => el.classList.toggle('highlight', i === highlight));
    const el = items[highlight];
    if (el) el.scrollIntoView({block:'nearest'});
  }

  list.addEventListener('mousedown', e => {
    const el = e.target.closest('.combo-item[data-idx]');
    if (el) {
      e.preventDefault();
      select(currentItems[+el.dataset.idx]);
    }
  });

  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !list.contains(e.target)) {
      list.classList.remove('open');
    }
  });

  // Programmatic set
  return {
    set(tz, label, sub) {
      input.value = label;
      input.dataset.tz = tz;
      input.dataset.sub = sub || '';
    },
    getTz() { return input.dataset.tz; }
  };
}

// ===== Time conversion =====
function pad(n){ return String(n).padStart(2,'0'); }

function getPartsInTz(date, tz) {
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, weekday:'long'
  });
  const parts = {};
  fmt.formatToParts(date).forEach(p => { parts[p.type] = p.value; });
  return {
    year: +parts.year, month: +parts.month, day: +parts.day,
    hour: +parts.hour === 24 ? 0 : +parts.hour,
    minute: +parts.minute, second: +parts.second,
    weekday: parts.weekday
  };
}

function zonedTimeToUTC(y, mo, d, h, mi, tz) {
  const utcGuess = Date.UTC(y, mo - 1, d, h, mi, 0);
  const parts = getPartsInTz(new Date(utcGuess), tz);
  const asUTC = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second);
  const diff = asUTC - utcGuess;
  return new Date(utcGuess - diff);
}

function getTzOffsetString(date, tz) {
  try {
    const fmt = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, timeZoneName:'shortOffset'
    });
    const parts = fmt.formatToParts(date);
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    return tzPart ? tzPart.value : '';
  } catch(e) { return ''; }
}

const WEEKDAY_CN = {
  Monday:"星期一", Tuesday:"星期二", Wednesday:"星期三",
  Thursday:"星期四", Friday:"星期五", Saturday:"星期六", Sunday:"星期日"
};

function initNow() {
  const now = new Date();
  const parts = getPartsInTz(now, comboA.getTz());
  dateA.value = `${parts.year}-${pad(parts.month)}-${pad(parts.day)}`;
  timeA.value = `${pad(parts.hour)}:${pad(parts.minute)}`;
}

function convert() {
  if (!dateA.value || !timeA.value) return;
  const tzA = comboA.getTz();
  const tzB = comboB.getTz();
  if (!tzA || !tzB) return;
  const [y, mo, d] = dateA.value.split('-').map(Number);
  const [h, mi] = timeA.value.split(':').map(Number);
  const utc = zonedTimeToUTC(y, mo, d, h, mi, tzA);
  const target = getPartsInTz(utc, tzB);
  const offset = getTzOffsetString(utc, tzB);

  resultTime.textContent = `${pad(target.hour)}:${pad(target.minute)}`;
  resultDate.textContent = `${target.year}-${pad(target.month)}-${pad(target.day)} ${WEEKDAY_CN[target.weekday] || target.weekday}`;
  const bLabel = document.getElementById('inputB').value;
  resultTz.textContent = `${bLabel} · ${offset}`;
}

[dateA, timeA].forEach(el => {
  el.addEventListener('input', convert);
  el.addEventListener('change', convert);
});

document.getElementById('swapBtn').addEventListener('click', () => {
  if (!dateA.value || !timeA.value) return;
  const tzA = comboA.getTz();
  const tzB = comboB.getTz();
  const [y, mo, d] = dateA.value.split('-').map(Number);
  const [h, mi] = timeA.value.split(':').map(Number);
  const utc = zonedTimeToUTC(y, mo, d, h, mi, tzA);
  const target = getPartsInTz(utc, tzB);

  const inputA = document.getElementById('inputA');
  const inputB = document.getElementById('inputB');
  const aLabel = inputA.value, aSub = inputA.dataset.sub || '';
  const bLabel = inputB.value, bSub = inputB.dataset.sub || '';

  comboA.set(tzB, bLabel, bSub);
  comboB.set(tzA, aLabel, aSub);
  dateA.value = `${target.year}-${pad(target.month)}-${pad(target.day)}`;
  timeA.value = `${pad(target.hour)}:${pad(target.minute)}`;
  updateHint('A'); updateHint('B');
  convert();
});

// Quick-pick chips
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const side = chip.dataset.target;
    const tz = chip.dataset.tz;
    const label = chip.dataset.label;
    // Find sub from COUNTRIES
    const entry = ENTRIES.find(e => e.tz === tz && e.type === 'country');
    const sub = entry ? entry.sub : '';
    const parts = label.split('(');
    const mainLabel = parts[0].trim();
    if (side === 'A') comboA.set(tz, mainLabel, sub);
    else comboB.set(tz, mainLabel, sub);
    updateHint(side);
    convert();
  });
});

initNow();
convert();
